<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion du Poulailler</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>🐔 Gestion du Poulailler</h1>
      <p class="subtitle">Suivi des sorties de poussins</p>
    </header>

    <section class="form-section">
      <h2 id="form-title">Ajouter une sortie</h2>
      <form id="entry-form">
        <div class="form-group">
          <label for="date">Date de sortie</label>
          <input type="date" id="date" required>
        </div>
        <div class="form-group">
          <label for="nombre">Nombre de poussins</label>
          <input type="number" id="nombre" min="1" required>
        </div>
        <div class="form-group">
          <label for="race">Race</label>
          <select id="race" required>
            <option value="">Sélectionner une race</option>
            <option value="Poulet de Bresse">Poulet de Bresse</option>
            <option value="Gauloise">Gauloise</option>
            <option value="Marans">Marans</option>
            <option value="Wyandotte">Wyandotte</option>
            <option value="Orpington">Orpington</option>
            <option value="Sussex">Sussex</option>
            <option value="Brahma">Brahma</option>
            <option value="Cochin">Cochin</option>
            <option value="Autre">Autre</option>
          </select>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">Ajouter</button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display:none">Annuler</button>
        </div>
      </form>
    </section>

    <section class="table-section">
      <h2>Liste des sorties</h2>
      <div class="table-controls">
        <span id="entry-count">0 entrée(s)</span>
        <button class="btn btn-danger btn-sm" id="clear-all" title="Tout supprimer">🗑️ Tout supprimer</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th data-sort="date" class="sortable">Date <span class="sort-indicator"></span></th>
              <th data-sort="nombre" class="sortable">Nombre <span class="sort-indicator"></span></th>
              <th data-sort="race" class="sortable">Race <span class="sort-indicator"></span></th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="entries-table"></tbody>
        </table>
      </div>
      <p id="empty-message" class="empty">Aucune sortie enregistrée pour le moment.</p>
    </section>
  </div>

  <div id="confirm-modal" class="modal" style="display:none">
    <div class="modal-content">
      <p>Êtes-vous sûr de vouloir supprimer cette entrée ?</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirm-delete">Supprimer</button>
        <button class="btn btn-secondary" id="cancel-delete">Annuler</button>
      </div>
    </div>
  </div>

  <div id="clear-modal" class="modal" style="display:none">
    <div class="modal-content">
      <p>Êtes-vous sûr de vouloir supprimer <strong>toutes</strong> les entrées ?</p>
      <div class="modal-actions">
        <button class="btn btn-danger" id="confirm-clear">Tout supprimer</button>
        <button class="btn btn-secondary" id="cancel-clear">Annuler</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
